description = "<p>Bryan and Adam were joined by members of the Oxide mechanical engineering team to talk the mechanical challenges of building a rack-scale computer, and--in particular--of scaling manufacturing from just a few racks to hundreds. <strong>NOTE: Keep an eye on the chapter art for the pictures under discussion.<br /></strong><br />In addition to <a href=\"https://bsky.app/profile/bcantrill.bsky.social\">Bryan Cantrill</a> and <a href=\"https://bsky.app/profile/ahl.bsky.social\">Adam Leventhal</a>, we were joined by Oxide Colleagues Elliott Donlon, Brooks Willis, Doug Wibben, and Ben Williams.</p><p><br /></p><p>Some of the topics we hit on, in the order that we hit them:</p><ul><li><a href=\"https://github.com/oxidecomputer/oxide-and-friends/blob/master/link\">Topic</a></li><li>[@M:SS](link into recording) <em>Leventhal's Conundrum</em></li><li>PRs needed!</li></ul><p>If we got something wrong or missed something, please file a PR! Our next show will likely be on Monday at 5p Pacific Time on our Discord server; stay tuned to our Mastodon feeds for details, or <a href=\"https://calendar.google.com/calendar/ical/c_318925f4185aa71c4524d0d6127f31058c9e21f29f017d48a0fca6f564969cd0%40group.calendar.google.com/public/basic.ics\">subscribe to this calendar</a>. We'd love to have you join us, as we always love to hear from new speakers!</p>"
