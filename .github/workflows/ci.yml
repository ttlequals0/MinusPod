name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache torch CPU wheels
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-torch-cpu-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-torch-cpu-

      - name: Install CPU-only torch (matches Dockerfile 2.6.0)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.6.0 torchaudio==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project requirements
        run: pip install -r requirements.txt

      - name: Set up Node 20 (for frontend build that produces static/ui)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (favicon and static asset tests require it)
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (runs tsc then vite build)
        run: npm run build

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements
        # Ignored advisories carry no upstream fix:
        # - PYSEC-2024-277 (joblib): pickle-deserialization advisory inherent to the
        #   library; MinusPod only loads joblib artefacts the container itself wrote,
        #   never user-supplied pickles. Revisit if joblib publishes a fix release.
        # - PYSEC-2025-183 (pyjwt): officially disputed; no PyJWT release resolves it.
        #   We are on the current 2.12.1.
        run: pip-audit --requirement requirements.txt --strict
          --ignore-vuln PYSEC-2024-277
          --ignore-vuln PYSEC-2025-183

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit
        run: npm audit --audit-level=high
