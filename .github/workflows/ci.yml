name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache torch CPU wheels
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pip
          key: pip-torch-cpu-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-torch-cpu-

      - name: Install CPU-only torch (matches Dockerfile 2.13.0)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.13.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project requirements
        run: pip install -r requirements.txt

      - name: Set up Node 20 (for frontend build that produces static/ui)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (favicon and static asset tests require it)
        working-directory: frontend
        run: npm ci && npm run build

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (runs tsc then vite build)
        run: npm run build

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit requirements
        # Ignored advisories carry no upstream fix:
        # - PYSEC-2024-277 (joblib): pickle-deserialization advisory inherent to the
        #   library; MinusPod only loads joblib artefacts the container itself wrote,
        #   never user-supplied pickles. Revisit if joblib publishes a fix release.
        # - PYSEC-2025-183 (pyjwt): officially disputed; no PyJWT release resolves it.
        #   We are on the current 2.12.1.
        run: pip-audit --requirement requirements.txt --strict
          --ignore-vuln PYSEC-2024-277
          --ignore-vuln PYSEC-2025-183

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit
        run: npm audit --audit-level=high

  ruff:
    name: ruff (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.15.20

      - name: Lint (ruff)
        run: ruff check src tests
