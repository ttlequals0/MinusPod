name: CPU image (multi-arch)

# Builds and publishes ttlequals0/minuspod:<version>-cpu as a multi-arch
# manifest (linux/amd64 + linux/arm64). The amd64 leg runs on the standard
# GitHub-hosted runner; the arm64 leg runs on the free native arm64 runner
# (no QEMU). A final job merges both arch-specific digests into a single
# manifest list and tags it. Trigger is manual only - releases drive this
# from the user side, not every commit.
#
# Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
#
# The GPU image (ttlequals0/minuspod:<version>, :latest) is still built
# locally via the /build-and-push skill and stays amd64-only: the release
# flow gates on a local build and there is no arm64 GPU deployment target.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (matches version.py, e.g. 2.4.21). Pushed as :<version>-cpu."
        required: true
        type: string
      promote_cpu_tag:
        description: "Also tag and push as :cpu (post-merge floating tag)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cpu-image-${{ inputs.version }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ttlequals0/minuspod

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false  # let the surviving leg finish; its digest is still uploaded for inspection on partial failure
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_id: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_id: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Guard against publishing a mislabeled image: the checkout builds
      # whatever ref the dispatch ran on (main by default), independent of the
      # `version` input. If they disagree, the build was dispatched against a
      # ref that does not contain the code for that version (e.g. pre-merge
      # from main). Fail before any push.
      - name: Verify version.py matches the dispatched version
        env:
          EXPECTED: ${{ inputs.version }}
        run: |
          set -euo pipefail
          ACTUAL=$(sed -nE 's/^__version__ = "([^"]+)"$/\1/p' version.py)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Refusing to build: version.py is '$ACTUAL' but the workflow was dispatched for '$EXPECTED'." >&2
            echo "The checkout ref does not contain the code for $EXPECTED. Re-dispatch with --ref <branch-or-tag> whose version.py == $EXPECTED (e.g. the release branch, or main after merge)." >&2
            exit 1
          fi
          echo "version.py == $EXPECTED; ok to build."

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Docker Hub login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ./Dockerfile.cpu
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cpu-${{ matrix.arch_id }}
          cache-to: type=gha,scope=cpu-${{ matrix.arch_id }},mode=max

      - name: Export digest
        env:
          ARCH_ID: ${{ matrix.arch_id }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "build-push-action produced no digest output" >&2
            exit 1
          fi
          mkdir -p /tmp/digests
          echo "$IMAGE_DIGEST" > "/tmp/digests/$ARCH_ID"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digest-${{ matrix.arch_id }}
          path: /tmp/digests/${{ matrix.arch_id }}
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest
    runs-on: ubuntu-latest
    needs: build
    env:
      VERSION: ${{ inputs.version }}
      PROMOTE_CPU_TAG: ${{ inputs.promote_cpu_tag }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Docker Hub login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          AMD64_DIGEST=$(cat digest-amd64/amd64)
          ARM64_DIGEST=$(cat digest-arm64/arm64)
          TAGS=(-t "${REGISTRY_IMAGE}:${VERSION}-cpu")
          if [ "$PROMOTE_CPU_TAG" = "true" ]; then
            TAGS+=(-t "${REGISTRY_IMAGE}:cpu")
          fi
          docker buildx imagetools create \
            "${TAGS[@]}" \
            "${REGISTRY_IMAGE}@${AMD64_DIGEST}" \
            "${REGISTRY_IMAGE}@${ARM64_DIGEST}"

      - name: Inspect resulting manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${VERSION}-cpu"
          if [ "$PROMOTE_CPU_TAG" = "true" ]; then
            docker buildx imagetools inspect "${REGISTRY_IMAGE}:cpu"
          fi
