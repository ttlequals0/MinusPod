name: Community Pattern Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'patterns/community/**'

# Fork-PR safety: this workflow runs with the PR's token, which is
# read-only when the PR comes from a fork. We do NOT request write
# scopes here. The companion workflow comment-community-patterns.yml
# runs on workflow_run from the base repo and is responsible for
# posting the validation report back to the PR.
permissions:
  contents: read

jobs:
  validate:
    name: Validate community pattern submissions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Need full history so the diff against pull_request.base.sha
          # works even after main has advanced past the PR's recorded
          # base. A shallow clone fails with "bad object <sha>" when the
          # base commit is not in the local pack, and the resulting
          # empty change list silently skips validation.
          fetch-depth: 0

      - name: List changed JSON files under patterns/community/
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Diff failures must abort the job -- we previously masked them
          # with `|| true` on the pipeline, which let an unreachable base
          # SHA produce an empty changed list and a misleading green run.
          git diff --diff-filter=AM --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed-raw.txt
          # Filtering can legitimately return zero matches; only `grep`'s
          # exit code 1 here is allowed to roll up to an empty result.
          changed=$(grep -E '^patterns/community/.+\.json$' /tmp/changed-raw.txt \
            | grep -v 'patterns/community/index.json' \
            | tr '\n' ' ' || true)
          echo "files=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed files: $changed"

      - name: Setup Python
        if: steps.changed.outputs.files != ''
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lightweight deps
        if: steps.changed.outputs.files != ''
        run: |
          python -m pip install --upgrade pip
          # The validator imports only stdlib + utils/community_tags, which
          # itself uses stdlib only. No requirements.txt install required.

      - name: Run validator
        if: steps.changed.outputs.files != ''
        id: validate
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          set +e
          set -f  # noglob: $CHANGED_FILES is a word-split list, not a glob (ci-4)
          mkdir -p /tmp/pattern-validation
          python -m src.tools.community_pattern_validator \
            --pr-files $CHANGED_FILES \
            --comment-output /tmp/pattern-validation/comment.md \
            --status-output /tmp/pattern-validation/status.txt
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Emit report to job summary
        if: always() && steps.changed.outputs.files != ''
        run: |
          if [ -f /tmp/pattern-validation/comment.md ]; then
            cat /tmp/pattern-validation/comment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Record PR number for comment workflow
        if: always() && steps.changed.outputs.files != ''
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p /tmp/pattern-validation
          echo "$PR_NUMBER" > /tmp/pattern-validation/pr_number.txt

      - name: Upload validation report
        if: always() && steps.changed.outputs.files != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pattern-validation-report
          path: /tmp/pattern-validation/
          if-no-files-found: error
          retention-days: 7

      - name: Fail job on rejection
        if: steps.changed.outputs.files != '' && steps.validate.outputs.exit != '0'
        run: |
          echo "Community pattern validation rejected one or more files."
          echo "See the job summary or PR comment for details."
          exit 1
