# docker-compose.yml — Coolify deployment
#
# Coolify setup:
#   1. Create a new "Docker Compose" application in Coolify
#   2. Point it at this repository
#   3. Set the service name to "minuspod" and port to 8000
#   4. Add environment variables in Coolify's UI (see .env.example)
#   5. Deploy — Coolify builds the image and handles SSL/routing via Traefik
#
# GPU (optional): Enable the NVIDIA runtime in Coolify host settings,
# then uncomment the `deploy.resources.reservations` block below and
# set WHISPER_BACKEND=local + WHISPER_DEVICE=cuda.

services:
  minuspod:
    build: .
    expose:
      - "8000"
    volumes:
      - minuspod-data:/app/data
      # Optional: custom replacement audio (place replace.mp3 here)
      # - ./assets:/app/assets:ro
    environment:
      # =================================================================
      # LLM Provider — pick ONE option, set the rest blank or omit them
      # =================================================================

      # Option 1: OpenRouter  (default — 200+ models, one API key)
      - LLM_PROVIDER=${LLM_PROVIDER:-openrouter}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # Option 2: Anthropic API
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Option 3: OpenAI-compatible endpoint (Ollama, local wrapper, etc.)
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}

      # =================================================================
      # Whisper transcription — pick ONE option
      # =================================================================

      # Option 1: OpenRouter Whisper API  (default — no GPU required)
      - WHISPER_BACKEND=${WHISPER_BACKEND:-openrouter-api}
      - WHISPER_API_MODEL=${WHISPER_API_MODEL:-openai/whisper-large-v3-turbo}

      # Option 2: External Whisper API (Groq, OpenAI, whisper.cpp)
      - WHISPER_API_BASE_URL=${WHISPER_API_BASE_URL}
      - WHISPER_API_KEY=${WHISPER_API_KEY}

      # Option 3: Local Whisper  (requires GPU — see deploy block below)
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}

      # =================================================================
      # Server
      # =================================================================
      # Set BASE_URL to the public domain Coolify assigns (e.g. https://minuspod.example.com)
      - BASE_URL=${BASE_URL}
      - RETENTION_PERIOD=${RETENTION_PERIOD:-1440}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

    # Uncomment for GPU-accelerated local Whisper.
    # Requires the NVIDIA Container Toolkit on the Coolify host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =================================================================
  # Optional: whisper.cpp  (local GPU transcription server)
  # =================================================================
  # For Coolify we recommend OpenRouter or Groq instead — they need no
  # model download and no GPU.  Enable this only if you have a GPU host
  # and want fully self-hosted transcription.
  #
  # Pre-requisite (run once on the host before deploying):
  #   git clone --depth 1 https://github.com/ggml-org/whisper.cpp
  #   bash whisper.cpp/models/download-ggml-model.sh large-v3-turbo
  #   mkdir -p models && mv whisper.cpp/models/ggml-large-v3-turbo.bin models/
  #
  # Then set these env vars in Coolify:
  #   WHISPER_BACKEND=openai-api
  #   WHISPER_API_BASE_URL=http://whisper-server:8765/v1
  #   WHISPER_DEVICE=cpu   (MinusPod won't load a local model)
  #
  # whisper-server:
  #   image: ghcr.io/ggml-org/whisper.cpp:main-cuda
  #   platform: linux/amd64
  #   volumes:
  #     - ./models:/models
  #   working_dir: /tmp
  #   command:
  #     - >-
  #       whisper-server
  #       --host 0.0.0.0
  #       --port 8765
  #       --model /models/ggml-large-v3-turbo.bin
  #       --inference-path /v1/audio/transcriptions
  #       --threads 8
  #       --processors 1
  #       --dtw large.v3.turbo
  #       --no-flash-attn
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:8765/health || exit 1"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 30s
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  minuspod-data:
